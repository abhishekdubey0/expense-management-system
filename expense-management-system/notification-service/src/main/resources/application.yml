server:
  port: 8085

spring:
  application:
    name: notification-service

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:noreply@expensemanager.com}
    password: ${SPRING_MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.expensemanager.*"

notification:
  from-email: ${SPRING_MAIL_USERNAME:noreply@expensemanager.com}
  from-name: "Expense Manager"
  app-url: ${APP_URL:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.expensemanager: DEBUG
