server:
  port: 8084

spring:
  application:
    name: report-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3310/report_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:expenseuser}
    password: ${SPRING_DATASOURCE_PASSWORD:expensepass123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:redispass123}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000        # 5 minutes default TTL

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

expense-service:
  url: ${EXPENSE_SERVICE_URL:http://expense-service:8082}

# Cache TTLs (ms)
cache:
  ttl:
    monthly-summary: 300000       # 5 minutes
    category-breakdown: 600000    # 10 minutes
    department-report: 900000     # 15 minutes

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches

logging:
  level:
    com.expensemanager: DEBUG
