server:
  port: 8083

spring:
  application:
    name: approval-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3309/approval_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:expenseuser}
    password: ${SPRING_DATASOURCE_PASSWORD:expensepass123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: approval-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.expensemanager.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

expense-service:
  url: ${EXPENSE_SERVICE_URL:http://localhost:8082}

# Approval policy: amounts above threshold require finance-admin sign-off
approval:
  policy:
    manager-threshold: 10000.00    # amounts <= this only need manager approval
    finance-threshold: 50000.00    # amounts > manager-threshold need finance too

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
